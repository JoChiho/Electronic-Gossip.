name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  REPO_DIR: repo

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.REPO_DIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_DIR }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-build.txt
          pip install -e .
          pytest tests/ -q --ignore=tests/test_gui_dpi.py

      - name: Build executables
        run: |
          pyinstaller packaging/bagua.spec --noconfirm --clean
          pyinstaller packaging/bagua-gui.spec --noconfirm --clean

      - name: Package zip
        run: |
          $v = (python -c "from bagua import __version__; print(__version__)").Trim()
          Compress-Archive -Path dist/bagua.exe, dist/bagua-gui.exe -DestinationPath "bagua-v$v-win64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.REPO_DIR }}/bagua-v*-win64.zip
          generate_release_notes: true