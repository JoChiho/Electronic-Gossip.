name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 仓库名 Electronic-Gossip. 末尾带点，Windows runner 默认工作目录无法创建；
# checkout 到无尾点的子目录规避（见 JoChiho/Electronic-Gossip. #actions）。
env:
  REPO_DIR: repo

jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ env.REPO_DIR }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_DIR }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Ruff lint
        run: ruff check bagua tests scripts

      - name: Mypy typecheck
        run: mypy bagua

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_gui_dpi.py